version: 0.2

# This buildspec is invoked once per stage (dev/preprod/prod).
# The DEPLOY_STAGE env var is set by the CodePipeline stage's CodeBuild action.

phases:
  install:
    commands:
      # === Verdaccio workaround (MDAA packages not on public npm) ===
      - |
        set -e
        echo "Setting up local npm registry for MDAA packages..."
        mkdir -p /tmp/mdaa-packages
        aws s3 cp "s3://${MODEL_BUCKET_NAME}/mdaa-packages/" /tmp/mdaa-packages/ --recursive --quiet
        npm install -g verdaccio --registry https://registry.npmjs.org
        mkdir -p /root/.config/verdaccio
        cat > /root/.config/verdaccio/config.yaml << 'VCONF'
        storage: /tmp/verdaccio-storage
        auth:
          htpasswd:
            file: ./htpasswd
            max_users: 100
        uplinks:
          npmjs:
            url: https://registry.npmjs.org/
        packages:
          '@aws-mdaa/*':
            access: $all
            publish: $all
          '**':
            access: $all
            publish: $all
            proxy: npmjs
        log: { type: stdout, format: pretty, level: error }
        VCONF
        nohup verdaccio --listen 4873 > /tmp/verdaccio.log 2>&1 &
        sleep 3
        TOKEN=$(curl -s -X PUT http://localhost:4873/-/user/org.couchdb.user:ci \
          -H "Content-Type: application/json" \
          -d '{"name":"ci","password":"ci12345"}' | python3 -c "import json,sys;print(json.load(sys.stdin).get('token',''))")
        echo "//localhost:4873/:_authToken=\"${TOKEN}\"" >> /root/.npmrc
        for tgz in /tmp/mdaa-packages/*.tgz; do
          npm publish "$tgz" --registry http://localhost:4873 2>/dev/null || true
        done
        npm config set registry http://localhost:4873
        echo "Local registry ready"
      - npm install -g @aws-mdaa/cli

  pre_build:
    commands:
      - echo "Deploying stage ${DEPLOY_STAGE} for project ${PROJECT_NAME}"
      # Resolve the latest approved model package ARN
      - |
        set -e
        export MODEL_PACKAGE_ARN=$(aws sagemaker list-model-packages \
          --model-package-group-name "${MODEL_PACKAGE_GROUP_NAME}" \
          --model-approval-status Approved \
          --sort-by CreationTime --sort-order Descending \
          --max-results 1 \
          --query 'ModelPackageSummaryList[0].ModelPackageArn' --output text)
        if [ "${MODEL_PACKAGE_ARN}" = "None" ] || [ -z "${MODEL_PACKAGE_ARN}" ]; then
          echo "ERROR: No approved model package found in group ${MODEL_PACKAGE_GROUP_NAME}"; exit 1
        fi
        echo "Latest approved model: ${MODEL_PACKAGE_ARN}"
      # Resolve the training pipeline's bucket and KMS key.
      # The model.tar.gz lives in the training seed code's pipeline bucket.
      # PIPELINE_BUCKET_NAME may already be set by the L3 construct (when pipelineBucketName is configured).
      # Otherwise, look it up from the training seed code's SSM exports using the model package group name.
      - |
        set -e
        if [ -z "${PIPELINE_BUCKET_NAME}" ]; then
          MPG_SSM=$(aws ssm get-parameters-by-path \
            --path "/${MDAA_ORG}/mlops/pipeline/sm-pipeline/" \
            --recursive --query "Parameters[?ends_with(Name, '/model-bucket-name')].Value" \
            --output text 2>/dev/null || echo "")
          if [ -n "${MPG_SSM}" ]; then
            export PIPELINE_BUCKET_NAME="${MPG_SSM}"
          else
            export PIPELINE_BUCKET_NAME="${MODEL_BUCKET_NAME}"
          fi
        fi
        if [ -n "${PIPELINE_BUCKET_NAME}" ]; then
          export PIPELINE_BUCKET_ARN="arn:aws:s3:::${PIPELINE_BUCKET_NAME}"
        fi
        export PIPELINE_KMS_ARN="${PIPELINE_KMS_ARN:-}"
        echo "Pipeline bucket: ${PIPELINE_BUCKET_NAME:-<not set>}, KMS: ${PIPELINE_KMS_ARN:-<not set>}"

  build:
    commands:
      # Validate that cross-account env vars are set for non-dev stages
      - |
        if [ "${DEPLOY_STAGE}" = "preprod" ] && [ -z "${PRE_PROD_ACCOUNT_ID}" ]; then
          echo "ERROR: PRE_PROD_ACCOUNT_ID not set for preprod stage"; exit 1
        fi
        if [ "${DEPLOY_STAGE}" = "prod" ] && [ -z "${PROD_ACCOUNT_ID}" ]; then
          echo "ERROR: PROD_ACCOUNT_ID not set for prod stage"; exit 1
        fi

      # Select the correct VPC config for the current stage.
      # The construct passes per-stage env vars (DEV_*, PRE_PROD_*, PROD_*).
      # We normalize them to STAGE_* so the MDAA configs are stage-agnostic.
      - |
        case "${DEPLOY_STAGE}" in
          dev)
            export STAGE_VPC_ID="${DEV_VPC_ID}"
            export STAGE_SUBNET_IDS="${DEV_SUBNET_IDS}"
            export STAGE_SECURITY_GROUP_IDS="${DEV_SECURITY_GROUP_IDS}"
            ;;
          preprod)
            export STAGE_VPC_ID="${PRE_PROD_VPC_ID}"
            export STAGE_SUBNET_IDS="${PRE_PROD_SUBNET_IDS}"
            export STAGE_SECURITY_GROUP_IDS="${PRE_PROD_SECURITY_GROUP_IDS}"
            ;;
          prod)
            export STAGE_VPC_ID="${PROD_VPC_ID}"
            export STAGE_SUBNET_IDS="${PROD_SUBNET_IDS}"
            export STAGE_SECURITY_GROUP_IDS="${PROD_SECURITY_GROUP_IDS}"
            ;;
          *)
            echo "ERROR: Unknown DEPLOY_STAGE '${DEPLOY_STAGE}'. Expected: dev|preprod|prod"; exit 1
            ;;
        esac
        export STAGE_SUBNET_IDS="${STAGE_SUBNET_IDS:-[]}"
        export STAGE_SECURITY_GROUP_IDS="${STAGE_SECURITY_GROUP_IDS:-[]}"
        echo "Stage VPC: ${STAGE_VPC_ID}, Subnets: ${STAGE_SUBNET_IDS}"

      # Resolve org name in MDAA routing configs
      - |
        for cfg in mdaa-config/mdaa-endpoint.yaml mdaa-config/mdaa-monitoring.yaml; do
          sed -i "s/{{env_var:MDAA_ORG}}/${MDAA_ORG}/g" "$cfg"
        done

      # Deploy endpoint (using per-stage domain: deploy-<stage>)
      - echo "=== Deploying ${DEPLOY_STAGE} endpoint ==="
      - cd mdaa-config && mdaa deploy -c ./mdaa-endpoint.yaml -d deploy-${DEPLOY_STAGE} && cd ..

      # Resolve the endpoint name for the monitoring config.
      # Same-account (dev): SSM param is readable — use it directly.
      # Cross-account (preprod/prod): SSM param lives in the target account, which
      #   CodeBuild cannot read. We construct the name from the MDAA naming convention:
      #   ${org}-${env}-deploy-${stage}-endpoint-${project}-${stage}-ep
      # No explicit `wait endpoint-in-service` is needed — CloudFormation already waits
      # for the endpoint to reach InService before marking the stack CREATE_COMPLETE.
      - |
        EP_SSM_PATH="/${MDAA_ORG}/deploy-${DEPLOY_STAGE}/endpoint/endpoint/${PROJECT_NAME}-${DEPLOY_STAGE}/endpoint-name"
        export ENDPOINT_NAME=$(aws ssm get-parameter --name "${EP_SSM_PATH}" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
        if [ -z "${ENDPOINT_NAME}" ]; then
          export ENDPOINT_NAME="${MDAA_ORG}-${MDAA_ENV:-dev}-deploy-${DEPLOY_STAGE}-endpoint-${PROJECT_NAME}-${DEPLOY_STAGE}-ep"
          echo "Constructed endpoint name (cross-account): ${ENDPOINT_NAME}"
        else
          echo "Endpoint name from SSM: ${ENDPOINT_NAME}"
        fi

      # Deploy monitoring (same domain: deploy-<stage>, different module)
      - echo "=== Deploying ${DEPLOY_STAGE} monitoring ==="
      - cd mdaa-config && mdaa deploy -c ./mdaa-monitoring.yaml -d deploy-${DEPLOY_STAGE} && cd ..
      - echo "=== ${DEPLOY_STAGE} stage complete ==="
